services:
  - type: web
    name: nyaya-setu-backend
    runtime: node
    rootDir: backend
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    buildCommand: npm ci && npx prisma generate --schema ../prisma/schema.prisma --config ../prisma.config.ts && npx prisma migrate deploy --schema ../prisma/schema.prisma --config ../prisma.config.ts && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nyaya-setu-db
          property: connectionString
      - key: ML_SERVICE_URL
        value: http://nyaya-setu-ml:10000
      - key: ML_SERVICE_TIMEOUT_MS
        value: "120000"
      - key: APP_URL
        value: https://nyaya-setu-frontend.onrender.com
      - key: CORS_ORIGINS
        value: https://*.onrender.com
      - key: COOKIE_SECURE
        value: "true"
      - key: ACCESS_TOKEN_TTL_SECONDS
        value: "900"
      - key: REFRESH_TOKEN_TTL_SECONDS
        value: "604800"
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

  - type: web
    name: nyaya-setu-ml
    runtime: python
    rootDir: ml-service
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: pip install -r requirements.txt && python train_model.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: web
    name: nyaya-setu-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://nyaya-setu-backend.onrender.com/api
      - key: VITE_ML_SERVICE_URL
        value: https://nyaya-setu-ml.onrender.com

databases:
  - name: nyaya-setu-db
    plan: free
