version: "3.9"

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: nyayasetu-db
    environment:
      POSTGRES_USER: neondb_owner
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: neondb
      POSTGRES_INITDB_ARGS: "-c shared_preload_libraries=pg_stat_statements"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neondb_owner -d neondb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nyayasetu-network

  # ML Service (Python FastAPI)
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: nyayasetu-ml
    environment:
      PYTHONUNBUFFERED: "1"
      NYAYASETU_ASR_MODEL: "large"
      NYAYASETU_WHISPER_MODEL: "large"
      NYAYASETU_FORCE_TFIDF: "false"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - nyayasetu-network
    # Uncomment volumes if you want to mount the model directory
    # volumes:
    #   - ./ml-service:/app

  # Backend (Node.js/Express/TypeScript)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nyayasetu-backend
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: "postgresql://neondb_owner:password123@db:5432/neondb?sslmode=disable"
      ML_SERVICE_URL: "http://ml-service:8000"
      ML_SERVICE_TIMEOUT_MS: "120000"
      APP_URL: "http://localhost:5173"
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000"
      JWT_ACCESS_SECRET: "your-access-secret-change-in-production"
      JWT_REFRESH_SECRET: "your-refresh-secret-change-in-production"
      ACCESS_TOKEN_TTL_SECONDS: "900"
      REFRESH_TOKEN_TTL_SECONDS: "604800"
      COOKIE_SECURE: "false"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - nyayasetu-network

  # Frontend (React/Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:5000"
    container_name: nyayasetu-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - nyayasetu-network

volumes:
  postgres_data:
    driver: local

networks:
  nyayasetu-network:
    driver: bridge
