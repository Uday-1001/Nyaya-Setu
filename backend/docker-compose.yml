version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: nyayasetu-db-dev
    environment:
      POSTGRES_USER: neondb_owner
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: neondb
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neondb_owner"]
      interval: 10s
      timeout: 5s
      retries: 5

  ml-service:
    image: nyayasetu-ml:latest
    container_name: nyayasetu-ml-dev
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_dev_data:
